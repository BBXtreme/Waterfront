# Mosquitto MQTT Broker Configuration
# Secured with username/password and TLS
# Generate password file: mosquitto_passwd -c /mosquitto/config/passwd mqttuser
# Create passwd file: docker exec -it mosquitto mosquitto_passwd -c /mosquitto/config/passwd mqttuser
# For self-signed certs (development only):
# openssl req -new -x509 -days 365 -extensions v3_ca -keyout ca.key -out ca.crt
# openssl genrsa -out server.key 2048
# openssl req -out server.csr -key server.key -new
# openssl x509 -req -in server.csr -CA ca.crt -CAkey ca.key -CAcreateserial -out server.crt -days 365
# For production, use Let's Encrypt or similar.

listener 1883
allow_anonymous false
password_file /mosquitto/config/passwd

listener 8883
allow_anonymous false
password_file /mosquitto/config/passwd
cafile /mosquitto/config/ca.crt
certfile /mosquitto/config/server.crt
keyfile /mosquitto/config/server.crt
require_certificate false

listener 9001
protocol websockets
allow_anonymous false
password_file /mosquitto/config/passwd

log_dest stdout
log_type all
