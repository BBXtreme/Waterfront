; platformio.ini
[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev                  ; change to esp32-s3-devkitc-1-n8r8 if S3
framework = espidf
monitor_speed = 115200
upload_speed = 921600
lib_deps = 
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^6.21
    vshymanskyy/TinyGSM@^0.12.0
build_flags = 
    -DCORE_DEBUG_LEVEL=4
    -DCONFIG_LOG_DEFAULT_LEVEL=4

; Optional: for S3 variant
[env:esp32s3dev]
platform = espressif32
board = esp32-s3-devkitc-1-n8r8
framework = espidf
; ... same lib_deps & flags